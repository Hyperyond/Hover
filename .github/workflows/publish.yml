name: Publish

# Auto-publishes the Hover packages to the public npm.org registry
# (https://registry.npmjs.org) when a v* tag is pushed. The same tarballs
# are also attached to a GitHub Release for archival.
#
# Trigger:    git tag -a v0.3.0 -m "..." && git push --tags
# Auth:       NPM_TOKEN repo secret (a granular automation token from
#             https://www.npmjs.com/settings/<user>/tokens with read+write
#             on @hover-dev/* and vite-plugin-hover / webpack-plugin-hover)
#             — must be added before the first run. GITHUB_TOKEN is
#             auto-injected (used for the Release).
#
# Packages (7 total):
#   Scoped, the @hover-dev org on npmjs.com
#     - @hover-dev/core              — the Node service
#     - @hover-dev/widget-bootstrap  — shared widget assets + bundle builder
#     - @hover-dev/astro             — Astro integration
#     - @hover-dev/nuxt              — Nuxt module
#     - @hover-dev/cli               — `npx @hover-dev/cli add` setup CLI
#   Unscoped (follows the community vite-plugin-* / webpack-*-plugin convention)
#     - vite-plugin-hover            — Vite plugin
#     - webpack-plugin-hover         — Webpack 5 plugin
#
# Dependency order matters: widget-bootstrap (and core) must be on npm
# before the four packages that depend on them can resolve. pnpm publish
# respects workspace dependency order automatically, but we still list the
# packages explicitly so the filter is unambiguous if order detection
# ever changes upstream.
#
# What it does:
#   1. Checkout, install pnpm + Node 24, restore pnpm cache
#   2. Rewrite each publishable package.json's version from the tag
#      (v0.3.0 → "0.3.0") so we don't have to remember to bump
#      package.json in lockstep
#   3. Typecheck + unit tests as a release gate
#   4. Build each package (tsc + asset copy for the packages that ship
#      non-TS files — widget-bootstrap copies src/widget/ to dist/widget/)
#   5. pnpm publish each one to https://registry.npmjs.org
#   6. Pack the same tarballs and attach to a GitHub Release
#
# Consumers can then install with no .npmrc and no auth — same shape as
# any other public npm package:
#   npx @hover-dev/cli add               # one command, picks the right shim
# or manually:
#   pnpm add -D vite-plugin-hover        # ...or @hover-dev/astro / @hover-dev/nuxt
#                                          / webpack-plugin-hover

on:
  push:
    tags:
      - 'v*'
  # Allow manual reruns from the Actions tab. Uses the workflow's current
  # tip — useful for re-publishing a botched release without retagging.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write   # softprops/action-gh-release needs this to create the Release

# Single source of truth for the publishable-package filter chain — every
# step below reuses it via ${{ env.PKG_FILTERS }}. Adding a new package?
# Update this one variable.
env:
  PKG_FILTERS: >-
    --filter @hover-dev/core
    --filter @hover-dev/widget-bootstrap
    --filter vite-plugin-hover
    --filter @hover-dev/astro
    --filter @hover-dev/nuxt
    --filter webpack-plugin-hover
    --filter @hover-dev/cli

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node + npm.org registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          scope: '@hover-dev'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # GITHUB_REF_NAME is e.g. "v0.3.0"; strip the leading "v"
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version to publish."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Will publish version $VERSION"

      - name: Bump package versions in-place
        run: |
          # Rewrite each publishable package.json's version field without
          # committing or git-tagging (the tag already exists, that's why
          # we're here). --allow-same-version is a safety net if someone
          # already bumped manually before tagging.
          pnpm ${{ env.PKG_FILTERS }} exec npm version \
            "${{ steps.version.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        # Only the publishable packages — `pnpm test` at the root also
        # fans out to examples/basic-app whose tests are Playwright e2e
        # against an actual dev server (not appropriate as a publish gate,
        # and would need a chromium install in CI).
        run: pnpm ${{ env.PKG_FILTERS }} --if-present test

      - name: Build
        run: pnpm build

      - name: Publish to npm.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --no-git-checks: CI checkouts are detached HEAD; pnpm would
        # otherwise refuse to publish. The git tag is the source of truth
        # for this release.
        # --access public: required on the first publish of a scoped
        # package; npm.org defaults scoped packages to restricted/private
        # unless you say otherwise.
        run: pnpm ${{ env.PKG_FILTERS }} publish --no-git-checks --access public

      - name: Pack tarballs for release assets
        # Re-pack so the GitHub Release has the same tarballs we just
        # published — useful for archival / offline mirroring.
        run: |
          mkdir -p release-tarballs
          pnpm ${{ env.PKG_FILTERS }} exec pnpm pack --pack-destination "$GITHUB_WORKSPACE/release-tarballs"

      - name: Create GitHub Release
        # Only on real tag pushes; manual workflow_dispatch reuses an
        # existing tag and shouldn't recreate the Release.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from commits since the previous
          # tag (PR titles, contributors). The annotated tag message
          # we wrote becomes the leading body text.
          generate_release_notes: true
          files: release-tarballs/*.tgz
          fail_on_unmatched_files: true
