name: Publish

# Auto-publishes the Hover packages to the public npm.org registry
# (https://registry.npmjs.org) when a tag is pushed. The same tarballs
# are also attached to a GitHub Release for archival.
#
# Tag scheme (the tag prefix decides what publishes):
#   v0.X.0          → the main packages, LOCKSTEP: @hover-dev/core + @hover-dev/mcp
#   api-test-v0.X.0 → @hover-dev/api-test only
#   pentest-v0.X.0  → @hover-dev/pentest only (when it lands)
#   vscode-v0.X.0   → the hover-dev VS Code extension only (Marketplace + Open VSX)
# The plugins + the extension version independently from the main packages and
# from each other; only their own tag prefix publishes them.
#
# Trigger:    git tag -a v0.X.0 -m "..." && git push origin v0.X.0
#         or: git tag -a vscode-v0.X.0 -m "..." && git push origin vscode-v0.X.0
# Auth:       NPM_TOKEN repo secret — a granular automation token (npmjs.com
#             settings → tokens) with read+write on @hover-dev/*. Add it before
#             the first run. GITHUB_TOKEN is auto-injected (the Release). The
#             VS Code job uses VSCE_PAT (+ optional OVSX_TOKEN) instead.
#
# Packages:
#   npm (scoped, the @hover-dev org on npmjs.com)
#     - @hover-dev/core      — the engine (agent invocation, crystallize,
#                              grounded actuation, optimize, business memory).
#                              Published so @hover-dev/mcp can resolve it; users
#                              never install it directly.
#     - @hover-dev/mcp       — the MCP server users add to their own agent — the
#                              only public-facing install (`npx @hover-dev/mcp`).
#                              Lockstep with core on the v* track.
#     - @hover-dev/api-test  — api-test / security plugin (MITM proxy + MCP)
#     - @hover-dev/pentest   — pentest plugin (when it lands)
#   VS Code Marketplace + Open VSX
#     - hover-dev            — the review-cockpit extension (own vscode-v* tag)
#
# core + mcp publish in ONE run on a v* tag: pnpm publishes in dependency order
# and rewrites mcp's `workspace:*` core ref to the just-published core version.
#
# What it does:
#   1. Checkout, install pnpm + Node 24, restore pnpm cache
#   2. Resolve which packages this tag publishes + the version, then rewrite
#      those package.json versions from the tag (v0.16.0 → "0.16.0"). A plugin
#      tag also pins the plugin's @hover-dev/core range to the published core.
#   3. Typecheck + unit tests as a release gate
#   4. Build each package (tsc / tsup)
#   5. pnpm publish each one to https://registry.npmjs.org
#   6. Pack the same tarballs and attach to a GitHub Release
#
# Consumers install with no .npmrc and no auth — a normal public npm package.
# The only public-facing command is adding the MCP to your own coding agent:
#   claude mcp add hover -- npx -y @hover-dev/mcp

on:
  push:
    tags:
      - 'v*'            # main packages, lockstep             (e.g. v0.16.0)
      - 'api-test-v*'   # @hover-dev/api-test only            (e.g. api-test-v0.1.0)
      - 'pentest-v*'    # @hover-dev/pentest only, when it lands (e.g. pentest-v0.1.0)
      - 'vscode-v*'     # the hover-dev VSCode extension only  (e.g. vscode-v0.13.1)
                        #   → VS Code Marketplace + Open VSX. Secrets: VSCE_PAT
                        #     (Azure DevOps, Marketplace:Manage) + OVSX_TOKEN
                        #     (open-vsx.org). Versions independently of npm.
  # Allow manual reruns from the Actions tab. Uses the workflow's current
  # tip — useful for re-publishing a botched release without retagging.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0). Required for manual runs.'
        required: true
        type: string
      target:
        description: 'Which set to publish (manual runs only).'
        required: true
        default: main
        type: choice
        options: [main, api-test, pentest, vscode]

permissions:
  contents: write   # softprops/action-gh-release needs this to create the Release

# Which packages publish is decided per-tag by the "Resolve target" step:
#   v*           → @hover-dev/core + @hover-dev/mcp, lockstep
#   api-test-v*  → @hover-dev/api-test only
#   pentest-v*   → @hover-dev/pentest only (when it lands)
# The plugins version independently via their own tag prefixes. A plugin release
# also rewrites its @hover-dev/core peer range to the published core (see that
# step).

jobs:
  publish:
    # npm packages only — skip when this run targets the VSCode extension
    # (its own job below handles vscode-v* tags / the `vscode` dispatch target).
    if: ${{ !startsWith(github.ref_name, 'vscode-') && (github.event_name != 'workflow_dispatch' || inputs.target != 'vscode') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node + npm.org registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          scope: '@hover-dev'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target + version
        id: resolve
        run: |
          # The bundler-plugin / in-page-widget packages (vite-plugin-hover,
          # @hover-dev/{astro,nuxt,next,cli,widget-bootstrap}, webpack-plugin-hover,
          # @hover-dev/transform-source) were removed — that npm path is retired.
          # The main v* track now publishes @hover-dev/core + @hover-dev/mcp
          # LOCKSTEP (mcp depends on core via workspace:* → pnpm rewrites it to
          # the published core version when both publish in the same run). The
          # security / pentest plugins version on their own tag prefixes below.
          MAIN_FILTERS="--filter @hover-dev/core --filter @hover-dev/mcp"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
            VERSION="${{ inputs.version }}"
          else
            REF="${GITHUB_REF_NAME}"
            case "$REF" in
              api-test-v*) TARGET="api-test"; VERSION="${REF#api-test-v}" ;;
              pentest-v*)  TARGET="pentest";  VERSION="${REF#pentest-v}" ;;
              v*)          TARGET="main";     VERSION="${REF#v}" ;;
              *) echo "::error::Unrecognized tag '$REF' (expected v*, api-test-v*, or pentest-v*)."; exit 1 ;;
            esac
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version to publish."
            exit 1
          fi
          case "$TARGET" in
            main)     FILTERS="$MAIN_FILTERS";              IS_PLUGIN=false; PKG_DIR="" ;;
            api-test) FILTERS="--filter @hover-dev/api-test"; IS_PLUGIN=true;  PKG_DIR="packages/api-test" ;;
            pentest)  FILTERS="--filter @hover-dev/pentest";  IS_PLUGIN=true;  PKG_DIR="packages/pentest" ;;
            *) echo "::error::Unknown target '$TARGET'."; exit 1 ;;
          esac
          {
            echo "target=$TARGET"
            echo "version=$VERSION"
            echo "filters=$FILTERS"
            echo "is_plugin=$IS_PLUGIN"
            echo "pkg_dir=$PKG_DIR"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing target=$TARGET version=$VERSION"

      - name: Pin plugin's internal @hover-dev/* ranges to published versions
        # A plugin (security / pentest) versions independently, so core is NOT
        # bumped in this run and still reads 0.0.0 in the checkout. Left alone,
        # pnpm would replace the plugin's `workspace:*` refs with `0.0.0` and
        # publish uninstallable deps. Rewrite every internal @hover-dev/* ref to
        # a real range against the LATEST published version before publish:
        #   - @hover-dev/core      → peer `>=<ver>` (works with that core or newer)
        #   - @hover-dev/api-test  → dep  `^<ver>`  (pentest's runtime dep on the
        #     security MITM runtime — without this it would publish as ^0.0.0)
        # CI-only — the repo keeps `workspace:*` for local dev.
        if: steps.resolve.outputs.is_plugin == 'true'
        run: |
          CORE_VER="$(npm view @hover-dev/core version)"
          SEC_VER="$(npm view @hover-dev/api-test version)"
          if [ -z "$CORE_VER" ]; then
            echo "::error::Could not read the published @hover-dev/core version from npm."
            exit 1
          fi
          echo "Pinning core peer >=$CORE_VER; security dep ^${SEC_VER:-<none>}"
          PKG="${{ steps.resolve.outputs.pkg_dir }}/package.json" CORE_VER="$CORE_VER" SEC_VER="$SEC_VER" node -e '
            const fs = require("node:fs");
            const f = process.env.PKG;
            const coreVer = process.env.CORE_VER;
            const secVer = process.env.SEC_VER;
            const p = JSON.parse(fs.readFileSync(f, "utf8"));
            for (const field of ["peerDependencies", "devDependencies", "dependencies"]) {
              if (!p[field]) continue;
              if (p[field]["@hover-dev/core"]) {
                p[field]["@hover-dev/core"] = field === "peerDependencies" ? ">=" + coreVer : "^" + coreVer;
              }
              // @hover-dev/api-test is a runtime dep of @hover-dev/pentest; pin it
              // to the published security so workspace:* never escapes as ^0.0.0.
              if (p[field]["@hover-dev/api-test"]) {
                if (!secVer) { console.error("@hover-dev/api-test not published; cannot pin"); process.exit(1); }
                p[field]["@hover-dev/api-test"] = "^" + secVer;
              }
            }
            fs.writeFileSync(f, JSON.stringify(p, null, 2) + "\n");
          '

      - name: Bump package versions in-place
        run: |
          # Rewrite each publishable package.json's version field without
          # committing or git-tagging (the tag already exists, that's why
          # we're here). --allow-same-version is a safety net if someone
          # already bumped manually before tagging.
          pnpm ${{ steps.resolve.outputs.filters }} exec npm version \
            "${{ steps.resolve.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        # Scope to the publishable packages (Vitest) — the release gate
        # shouldn't pull in anything heavier.
        run: pnpm ${{ steps.resolve.outputs.filters }} --if-present test

      - name: Build
        run: pnpm build

      - name: Publish to npm.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --no-git-checks: CI checkouts are detached HEAD; pnpm would
        # otherwise refuse to publish. The git tag is the source of truth
        # for this release.
        # --access public: required on the first publish of a scoped
        # package; npm.org defaults scoped packages to restricted/private
        # unless you say otherwise.
        run: pnpm ${{ steps.resolve.outputs.filters }} publish --no-git-checks --access public

      - name: Pack tarballs for release assets
        # Re-pack so the GitHub Release has the same tarballs we just
        # published — useful for archival / offline mirroring.
        run: |
          mkdir -p release-tarballs
          pnpm ${{ steps.resolve.outputs.filters }} exec pnpm pack --pack-destination "$GITHUB_WORKSPACE/release-tarballs"

      - name: Create GitHub Release
        # Only on real tag pushes; manual workflow_dispatch reuses an
        # existing tag and shouldn't recreate the Release.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from commits since the previous
          # tag (PR titles, contributors). The annotated tag message
          # we wrote becomes the leading body text.
          generate_release_notes: true
          files: release-tarballs/*.tgz
          fail_on_unmatched_files: true

  # ── The hover-dev VSCode extension ──────────────────────────────────────────
  # Triggered by a `vscode-v<X.Y.Z>` tag (or a manual run with target=vscode).
  # Builds the .vsix (a self-contained review cockpit — no staged engine; it
  # drives no agent) and publishes it to the VS Code Marketplace and Open VSX.
  # The extension versions independently of the npm packages.
  #
  # Prereqs (one-time):
  #   - VSCE_PAT  repo secret — Azure DevOps PAT, scope "Marketplace: Manage",
  #     for the `hyperyond` publisher (marketplace.visualstudio.com/manage).
  #   - OVSX_TOKEN repo secret — open-vsx.org access token; the `hyperyond`
  #     namespace must already exist (`ovsx create-namespace hyperyond`).
  #     If OVSX_TOKEN is absent, the Open VSX step is skipped (Marketplace still
  #     publishes).
  publish-vscode:
    if: ${{ startsWith(github.ref_name, 'vscode-') || (github.event_name == 'workflow_dispatch' && inputs.target == 'vscode') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#vscode-v}"
          fi
          if [ -z "$VERSION" ]; then echo "::error::Could not resolve a version."; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing hover-dev $VERSION"

      - name: Bump extension version in-place
        run: pnpm --filter hover-dev exec npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Typecheck
        run: pnpm --filter hover-dev run typecheck

      - name: Package .vsix
        # build (tsup) → build:webview (vite) → vsce package --no-dependencies
        run: pnpm --filter hover-dev run package

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode-ext
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm dlx @vscode/vsce publish --packagePath "$(ls hover-dev-*.vsix)"

      - name: Publish to Open VSX
        working-directory: packages/vscode-ext
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        if: ${{ env.OVSX_TOKEN != '' }}
        run: pnpm dlx ovsx publish "$(ls hover-dev-*.vsix)" -p "$OVSX_TOKEN"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: packages/vscode-ext/hover-dev-*.vsix
          fail_on_unmatched_files: true
