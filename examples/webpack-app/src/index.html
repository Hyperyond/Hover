<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hover · Webpack example</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 0.5rem; }
      section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
      button { padding: 0.4rem 0.8rem; margin-right: 0.5rem; }
      input { padding: 0.4rem; margin-right: 0.5rem; }
      code { background: #f3f3f3; padding: 0.1rem 0.3rem; border-radius: 3px; }
      li { margin: 0.2rem 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>Hover · Webpack example</h1>
      <p>
        This is the webpack smoke target. Plain vanilla webpack 5 + <code>webpack-dev-server</code>,
        no React, no Babel — the leanest possible host to dogfood
        <code>webpack-plugin-hover</code>. The plugin taps
        <code>HtmlWebpackPlugin</code>'s <code>alterAssetTagGroups</code> hook to
        inject the widget.
      </p>

      <section>
        <h2>Counter</h2>
        <p>Count: <span id="count">0</span></p>
        <button id="inc">+1</button>
        <button id="reset">Reset</button>
      </section>

      <section>
        <h2>Todos</h2>
        <form id="todo-form">
          <input id="todo-input" type="text" placeholder="What needs doing?" required />
          <button type="submit">Add</button>
        </form>
        <ul id="todo-list"></ul>
      </section>
    </main>
  </body>
</html>
